name: Auto Build Maohi Mod
on:
  workflow_dispatch:
jobs:
  build-mod-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.2'

      - name: Build with Gradle
        run: gradle build
        env:
          CONFIG: ${{ secrets.CONFIG }}

      - name: Get JAR file name
        id: jar-name
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-dev.jar" ! -name "*-sources.jar" | head -1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT

      - name: Delete existing release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: |
            ## Download
            Place Maohi.jar AND fabric-api-0.141.3+1.21.11.jar in your server mods/ folder.
          files: ${{ steps.jar-name.outputs.jar_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: maohi-latest-build
          path: ${{ steps.jar-name.outputs.jar_file }}
          retention-days: 60
